services:
  app:
    image: php:8.2-apache
    container_name: php-hola-mundo
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"

  db:
    image: mysql:8.0
    container_name: mysql-hola-mundo
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: holamundo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
