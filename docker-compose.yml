services:
  app:
    build: .
    container_name: php-hola-mundo
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-hola-mundo
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Secret123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Secret123!", "-Q", "SELECT 1", "-No"]
      interval: 15s
      timeout: 10s
      retries: 8
